<!doctype html>
<html lang="{{ site.lang | default: 'en-US' }}">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% seo %}
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    <style>
  img {
    max-width: 100%;
    height: auto;
  }

  .project-image {
    display: block;
    margin: 0.75rem 0 1rem 0;
    border: 1px solid #e5e5e5;
    border-radius: 8px;
    padding: 0.25rem;
    background: #fff;
  }

  .project-links a {
    font-weight: 600;
  }

  .note {
    color: #666;
    font-size: 0.95rem;
  }

  header img {
    border-radius: 8px;
    margin-bottom: 12px;
  }

  section h3 {
    margin-top: 2rem;
  }

  section ul li {
    margin-bottom: 0.35rem;
  }

  /*
    Fix for shorter laptop/desktop screens:
    Keep the left sidebar scrollable, while preserving the
    original Minimal theme spacing and appearance.
  */
  @media print, screen and (min-width: 961px) {
    header {
      top: 50px;
      bottom: 100px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header h1,
    header > img {
      flex: 0 0 auto;
    }

    header .profile-info {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      padding-right: 8px;

      /*
        These preserve the original theme appearance.
      */
      font: inherit;
      color: inherit;
      line-height: 1.5;
    }

    header .profile-info p,
    header .profile-info ul,
    header .profile-info ol,
    header .profile-info table,
    header .profile-info pre,
    header .profile-info dl {
      margin: 0 0 20px;
    }

    header .profile-info h1,
    header .profile-info h2,
    header .profile-info h3,
    header .profile-info h4,
    header .profile-info h5,
    header .profile-info h6 {
      margin: 0 0 20px;
      line-height: 1.1;
    }
  }

  /*
    On tablets and phones, use the normal page scroll.
  */
  @media (max-width: 960px) {
    header {
      display: block;
      overflow: visible;
    }

    header img {
      max-width: 220px;
    }

    header .profile-info {
      max-height: none;
      overflow: visible;
      padding-right: 0;
      line-height: inherit;
    }
  }
</style>
  </head>
  <body>
    <div class="wrapper">
      <header>
        <h1><a href="{{ '/' | relative_url }}">{{ site.title | default: site.github.repository_name }}</a></h1>

        {% if site.logo %}
          <img src="{{ site.logo | relative_url }}" alt="Portrait of {{ site.title }}" />
        {% endif %}

        <!-- <div>{{ site.description }}</div> -->
        <div class="profile-info">{{ site.description }}</div>
        
        <!-- <p class="view">
          <a href="https://github.com/JaberQezelbash">View My GitHub Profile</a>
        </p> -->
      </header>

      <section>
        {{ content }}
      </section>

      <footer>
        <!-- <p><small>Hosted on GitHub Pages</small></p> -->
        <p><small>Portfolio © Jaber Q. Chamak</small></p>
      </footer>
    </div>

    <script src="{{ '/assets/js/scale.fix.js' | relative_url }}"></script>
  </body>
</html>
