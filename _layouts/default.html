<!doctype html>
<html lang="{{ site.lang | default: 'en-US' }}">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% seo %}
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    <style>
      img {
        max-width: 100%;
        height: auto;
      }

      .project-image {
        display: block;
        margin: 0.75rem 0 1rem 0;
        border: 1px solid #e5e5e5;
        border-radius: 8px;
        padding: 0.25rem;
        background: #fff;
      }

      .project-links a {
        font-weight: 600;
      }

      .note {
        color: #666;
        font-size: 0.95rem;
      }

      header img {
        border-radius: 8px;
      }

      section h3 {
        margin-top: 2rem;
      }

      section ul li {
        margin-bottom: 0.35rem;
      }

      @media (max-width: 960px) {
        header img {
          max-width: 220px;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <header>
        <h1><a href="{{ '/' | relative_url }}">{{ site.title | default: site.github.repository_name }}</a></h1>

        {% if site.logo %}
          <img src="{{ site.logo | relative_url }}" alt="Portrait of {{ site.title }}" />
        {% endif %}

        <div>{{ site.description }}</div>

        <p class="view">
          <a href="https://github.com/JaberQezelbash">View My GitHub Profile</a>
        </p>
      </header>

      <section>
        {{ content }}
      </section>

      <footer>
        <p><small>Hosted on GitHub Pages</small></p>
        <p><small>Portfolio content © Jaber Chamak</small></p>
      </footer>
    </div>

    <script src="{{ '/assets/js/scale.fix.js' | relative_url }}"></script>
  </body>
</html>
